<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="chartTitle chartDesc">
  <title id="chartTitle">Chromatic color swatch chart</title>
  <desc id="chartDesc">A grid of color swatches spanning the spectrum, suggesting nuance between extremes.</desc>
  <defs>
    <filter id="softShadow" x="-8%" y="-8%" width="116%" height="116%">
